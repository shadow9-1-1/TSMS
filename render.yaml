services:
  - type: web
    name: tsms-live-demo
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 wsgi:app
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: AUTO_CREATE_DB
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_ADMIN_NAME
        sync: false
      - key: DEMO_ADMIN_EMAIL
        sync: false
      - key: DEMO_ADMIN_USERNAME
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        sync: false